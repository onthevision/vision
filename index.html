<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>내 앱</title>

    <!-- Manifest 연결 -->
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Hello App</h1>
    <button onclick="alert('작동됨')">클릭</button>

    <!-- Service Worker 등록 -->
    <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/vision/service-worker.js')
          .then(reg => console.log('SW registered', reg))
          .catch(err => console.log('SW registration failed', err));
      });
    }
    </script>
</body>
</html>
